{% extends "base.html" %}

{% block title %}NutriChat - Iniciar Sesión{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <!-- Login Card -->
            <div class="glass-card p-4 p-md-5">
                <!-- Header -->
                <div class="text-center mb-4">
                    <div class="avatar-circle bg-gradient-primary mb-3">
                        <i class="fas fa-sign-in-alt text-white"></i>
                    </div>
                    <h1 class="h3 text-white mb-2">Iniciar Sesión</h1>
                    <p class="text-muted mb-0">Accede a tu cuenta de NutriChat</p>
                </div>

                <!-- Login Form -->
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="telegram_id" class="form-label text-white">
                            <i class="fas fa-user me-2"></i>Telegram ID
                        </label>
                        <input type="number" 
                               class="form-control" 
                               id="telegram_id" 
                               placeholder="123456789"
                               required
                               min="100000000"
                               max="999999999">
                        <div class="form-text text-muted">
                            Ingresa tu ID de Telegram
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="d-grid gap-2 mb-3">
                        <button type="submit" class="btn btn-primary btn-lg" id="loginButton">
                            <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión
                        </button>
                    </div>

                    <!-- Register Link -->
                    <div class="text-center">
                        <p class="text-muted mb-2">¿No tienes cuenta?</p>
                        <a href="{{ url_for('register') }}" class="btn btn-outline-light btn-sm">
                            <i class="fas fa-user-plus me-1"></i>Registrarse
                        </a>
                    </div>
                </form>

                <!-- Quick Test -->
                <div class="mt-4 pt-4 border-top border-secondary">
                    <p class="text-muted small mb-2">Usuarios de prueba:</p>
                    <div class="d-flex gap-2">
                        <button class="btn btn-sm btn-outline-info flex-fill" onclick="testUser(123456789)">
                            Usuario 1
                        </button>
                        <button class="btn btn-sm btn-outline-info flex-fill" onclick="testUser(987654321)">
                            Usuario 2
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const telegramId = document.getElementById('telegram_id').value;
    const button = document.getElementById('loginButton');
    const originalText = button.innerHTML;
    
    if (!telegramId || telegramId.length < 9) {
        showAlert('Ingresa un Telegram ID válido (9 dígitos)', 'warning');
        return;
    }
    
    // Mostrar loading
    button.disabled = true;
    button.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Iniciando...';
    
    try {
        const response = await fetch('/api/v1/users/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                telegram_id: parseInt(telegramId)
            })
        });
        
        const data = await response.json();
        
        if (data.success) {
            showAlert('¡Bienvenido! Inicio de sesión exitoso', 'success');
            
            // Redirigir después de 1 segundo
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1000);
        } else {
            // Si el usuario no existe, intentar registrarlo
            if (data.message.includes('no encontrado')) {
                await registerUser(telegramId);
            } else {
                showAlert('Error: ' + data.message, 'danger');
                button.disabled = false;
                button.innerHTML = originalText;
            }
        }
    } catch (error) {
        console.error('Error:', error);
        showAlert('Error de conexión: ' + error.message, 'danger');
        button.disabled = false;
        button.innerHTML = originalText;
    }
});

async function registerUser(telegramId) {
    try {
        const response = await fetch('/api/v1/users/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                telegram_id: parseInt(telegramId),
                nombre: `Usuario ${telegramId.toString().slice(-4)}`
            })
        });
        
        const data = await response.json();
        
        if (data.success) {
            showAlert('¡Cuenta creada exitosamente! Redirigiendo...', 'success');
            
            // Guardar datos en session
            sessionStorage.setItem('user_id', data.user_id);
            sessionStorage.setItem('access_token', data.access_token);
            
            // Redirigir
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1500);
        } else {
            showAlert('Error al crear cuenta: ' + data.message, 'danger');
            document.getElementById('loginButton').disabled = false;
            document.getElementById('loginButton').innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión';
        }
    } catch (error) {
        console.error('Error:', error);
        showAlert('Error registrando usuario: ' + error.message, 'danger');
        document.getElementById('loginButton').disabled = false;
        document.getElementById('loginButton').innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión';
    }
}

function testUser(telegramId) {
    document.getElementById('telegram_id').value = telegramId;
    document.getElementById('loginForm').dispatchEvent(new Event('submit'));
}

function showAlert(message, type = 'info') {
    const alertDiv = document.createElement('div');
    alertDiv.className = `alert alert-${type} alert-dismissible fade show position-fixed top-0 start-50 translate-middle-x mt-3`;
    alertDiv.style.zIndex = '9999';
    alertDiv.style.minWidth = '300px';
    alertDiv.innerHTML = `
        <i class="fas ${type === 'success' ? 'fa-check-circle' : 
                         type === 'danger' ? 'fa-exclamation-circle' : 
                         type === 'warning' ? 'fa-exclamation-triangle' : 
                         'fa-info-circle'} me-2"></i>
        ${message}
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
    `;
    
    document.body.appendChild(alertDiv);
    
    setTimeout(() => {
        if (alertDiv.parentNode) {
            alertDiv.remove();
        }
    }, 5000);
}
</script>

<style>
.avatar-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #10B981, #3B82F6);
}

.avatar-circle i {
    font-size: 2rem;
}

.glass-card {
    background: rgba(30, 41, 59, 0.8);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(148, 163, 184, 0.3);
    border-radius: 15px;
}

.btn-primary {
    background: linear-gradient(135deg, #10B981, #3B82F6);
    border: none;
    padding: 12px 24px;
    font-weight: 500;
    border-radius: 10px;
    transition: all 0.3s ease;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
}

.form-control {
    background: rgba(15, 23, 42, 0.5);
    border: 1px solid rgba(148, 163, 184, 0.3);
    color: #F1F5F9;
    padding: 12px 16px;
    border-radius: 8px;
}

.form-control:focus {
    background: rgba(15, 23, 42, 0.7);
    border-color: #10B981;
    box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    color: #F1F5F9;
}
</style>
{% endblock %}
